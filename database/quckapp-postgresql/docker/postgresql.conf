# ============================================================================
# PostgreSQL 16 Configuration - QuckApp Development
# ============================================================================
# This configuration is tuned for LOCAL DEVELOPMENT on a machine with
# moderate resources (4-8 CPU cores, 8-16 GB RAM). Do NOT use in production
# without proper tuning for your workload and hardware.
# ============================================================================

# ---------------------------------------------------------------------------
# Connection Settings
# ---------------------------------------------------------------------------
listen_addresses = '*'
port = 5432
max_connections = 100
superuser_reserved_connections = 3

# ---------------------------------------------------------------------------
# Memory
# ---------------------------------------------------------------------------
# Shared buffers: ~25% of available RAM for dev (assuming 8 GB host)
shared_buffers = 512MB
work_mem = 16MB
maintenance_work_mem = 128MB
effective_cache_size = 2GB

# Huge pages - off for Docker / dev environments
huge_pages = off

# ---------------------------------------------------------------------------
# WAL (Write-Ahead Log)
# ---------------------------------------------------------------------------
wal_level = replica
max_wal_size = 1GB
min_wal_size = 80MB
wal_buffers = 16MB
checkpoint_completion_target = 0.9
checkpoint_timeout = 10min

# ---------------------------------------------------------------------------
# Query Planner
# ---------------------------------------------------------------------------
random_page_cost = 1.1          # SSD-friendly
effective_io_concurrency = 200  # SSD-friendly
default_statistics_target = 100

# ---------------------------------------------------------------------------
# Parallel Queries
# ---------------------------------------------------------------------------
max_worker_processes = 8
max_parallel_workers_per_gather = 2
max_parallel_workers = 8
max_parallel_maintenance_workers = 2

# ---------------------------------------------------------------------------
# Logging (verbose for development)
# ---------------------------------------------------------------------------
logging_collector = on
log_directory = 'log'
log_filename = 'postgresql-%Y-%m-%d.log'
log_rotation_age = 1d
log_rotation_size = 100MB
log_truncate_on_rotation = on

log_min_duration_statement = 250    # Log queries slower than 250ms
log_checkpoints = on
log_connections = on
log_disconnections = on
log_lock_waits = on
log_temp_files = 0
log_statement = 'ddl'              # Log all DDL statements
log_line_prefix = '%t [%p] %u@%d '

# ---------------------------------------------------------------------------
# Autovacuum
# ---------------------------------------------------------------------------
autovacuum = on
autovacuum_max_workers = 3
autovacuum_naptime = 1min
autovacuum_vacuum_threshold = 50
autovacuum_vacuum_scale_factor = 0.1
autovacuum_analyze_threshold = 50
autovacuum_analyze_scale_factor = 0.05

# ---------------------------------------------------------------------------
# Locale & Encoding
# ---------------------------------------------------------------------------
lc_messages = 'en_US.UTF-8'
lc_monetary = 'en_US.UTF-8'
lc_numeric = 'en_US.UTF-8'
lc_time = 'en_US.UTF-8'
default_text_search_config = 'pg_catalog.english'

# ---------------------------------------------------------------------------
# Timezone
# ---------------------------------------------------------------------------
timezone = 'UTC'
log_timezone = 'UTC'

# ---------------------------------------------------------------------------
# Development-specific
# ---------------------------------------------------------------------------
# Track query statistics (useful with pg_stat_statements if enabled)
track_activities = on
track_counts = on
track_io_timing = on
track_functions = 'all'

# JIT compilation - off in dev to reduce overhead and simplify debugging
jit = off

# Statement timeout - prevent runaway queries in dev
statement_timeout = 30000          # 30 seconds
lock_timeout = 10000               # 10 seconds
idle_in_transaction_session_timeout = 60000  # 60 seconds
