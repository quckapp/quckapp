# ==============================================================================
# QuckApp MongoDB Configuration — Development
# MongoDB 7.x compatible
#
# This configuration is intended for local development and Docker containers.
# Do NOT use this configuration in production without hardening.
#
# Mount as: /etc/mongod.conf
# Usage:    mongod --config /etc/mongod.conf
# ==============================================================================

# --- Storage ------------------------------------------------------------------
storage:
  dbPath: /data/db
  directoryPerDB: true

  # WiredTiger storage engine (default in MongoDB 7.x)
  engine: wiredTiger
  wiredTiger:
    engineConfig:
      # Cache size — for development, limit to 512MB.
      # Production: set to 50% of available RAM minus 1GB.
      cacheSizeGB: 0.5

      # Journal compressor
      journalCompressor: snappy

    collectionConfig:
      # Block compressor for collections
      blockCompressor: snappy

    indexConfig:
      # Prefix compression for indexes (saves memory)
      prefixCompression: true

  # Journaling — always enabled for data durability
  journal:
    enabled: true

# --- Networking ---------------------------------------------------------------
net:
  port: 27017
  # Bind to all interfaces in development (Docker networking).
  # Production: restrict to specific IPs.
  bindIp: 0.0.0.0

  # Max concurrent connections
  maxIncomingConnections: 256

  # Wire protocol compression
  compressors: snappy,zstd,zlib

# --- Security -----------------------------------------------------------------
# Authentication is disabled by default for local development.
# Enable for staging/production environments.
#
# security:
#   authorization: enabled
#   javascriptEnabled: false

# --- Logging ------------------------------------------------------------------
systemLog:
  destination: file
  path: /var/log/mongodb/mongod.log
  logAppend: true
  logRotate: reopen

  # Verbosity: 0 = informational, 1-5 = increasing debug detail
  verbosity: 0

  # Component-level verbosity
  component:
    accessControl:
      verbosity: 0
    command:
      verbosity: 0
    index:
      verbosity: 0
    query:
      verbosity: 0
    write:
      verbosity: 0

# --- Operation Profiling ------------------------------------------------------
operationProfiling:
  # Profile slow operations (> 100ms) for development debugging
  mode: slowOp
  slowOpThresholdMs: 100

# --- Replication --------------------------------------------------------------
# Replication is DISABLED for local development.
# For production, enable a replica set for high availability.
#
# replication:
#   replSetName: "rs0"
#   oplogSizeMB: 2048

# --- Process Management -------------------------------------------------------
processManagement:
  # Run in foreground (required for Docker)
  fork: false

  # PID file
  pidFilePath: /var/run/mongodb/mongod.pid

# --- Set Parameters -----------------------------------------------------------
setParameter:
  # Enable free monitoring (development only)
  enableLocalhostAuthBypass: true

  # Diagnostic data collection
  diagnosticDataCollectionEnabled: true
