# =============================================================================
# QuckApp Database Migration CI/CD
# =============================================================================
# Builds migration Docker images and runs them as Kubernetes Jobs.
#
# Usage:
#   - Auto-build on push to database/ submodule changes
#   - Manual trigger for specific database + environment
#   - Called by k8s-deploy-all.yml before service deployments
# =============================================================================

name: Database Migrations

on:
  push:
    branches: [main]
    paths:
      - 'database/**'

  workflow_dispatch:
    inputs:
      database:
        description: 'Database to migrate'
        required: true
        type: choice
        options:
          - all
          - mysql
          - postgresql
          - mongodb
          - elasticsearch
          - kafka
          - clickhouse
          - scylladb
          - dynamodb
      environment:
        description: 'Target environment'
        required: true
        type: choice
        options:
          - dev
          - qa
          - staging
          - production
      service:
        description: 'Target service (default: all services for that database)'
        required: false
        type: string
        default: 'all'
      dry_run:
        description: 'Dry run (build only, no deploy)'
        required: false
        type: boolean
        default: false

  workflow_call:
    inputs:
      database:
        required: true
        type: string
      environment:
        required: true
        type: string
      service:
        required: false
        type: string
        default: 'all'
      dry_run:
        required: false
        type: boolean
        default: false
    outputs:
      migration_status:
        description: 'Migration result (success/failed/skipped)'
        value: ${{ jobs.run-migrations.outputs.status }}

permissions:
  id-token: write
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository }}
  AWS_REGION: us-east-1

jobs:
  # ===========================================================================
  # Detect Changes & Prepare Build Matrix
  # ===========================================================================
  prepare:
    name: Prepare
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      image_tag: ${{ steps.set-tag.outputs.tag }}
      has_changes: ${{ steps.detect.outputs.has_changes }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 2

      - name: Set image tag
        id: set-tag
        run: |
          echo "tag=sha-$(echo ${{ github.sha }} | cut -c1-8)" >> $GITHUB_OUTPUT

      - name: Detect changed databases
        id: detect
        run: |
          DATABASE="${{ inputs.database || 'all' }}"

          ALL_DBS='[
            {"name":"mysql","repo":"quckapp-mysql","image":"db-migrate-mysql"},
            {"name":"postgresql","repo":"quckapp-postgresql","image":"db-migrate-postgresql"},
            {"name":"mongodb","repo":"quckapp-mongodb","image":"db-migrate-mongodb"},
            {"name":"elasticsearch","repo":"quckapp-elasticsearch","image":"db-migrate-elasticsearch"},
            {"name":"kafka","repo":"quckapp-kafka","image":"db-migrate-kafka"},
            {"name":"clickhouse","repo":"quckapp-clickhouse","image":"db-migrate-clickhouse"},
            {"name":"scylladb","repo":"quckapp-scylladb","image":"db-migrate-scylladb"},
            {"name":"dynamodb","repo":"quckapp-dynamodb","image":"db-migrate-dynamodb"}
          ]'

          if [ "${{ github.event_name }}" = "push" ]; then
            # Auto-detect which database repos changed
            CHANGED=$(git diff --name-only HEAD~1 HEAD -- database/ 2>/dev/null || echo "")
            CHANGED_DBS="[]"
            for db in mysql postgresql mongodb elasticsearch kafka clickhouse scylladb dynamodb; do
              if echo "$CHANGED" | grep -q "database/quckapp-$db"; then
                ENTRY=$(echo "$ALL_DBS" | jq -c ".[] | select(.name == \"$db\")")
                CHANGED_DBS=$(echo "$CHANGED_DBS" | jq -c ". + [$ENTRY]")
              fi
            done
            if [ "$CHANGED_DBS" = "[]" ]; then
              echo "has_changes=false" >> $GITHUB_OUTPUT
              echo "No database changes detected"
            else
              echo "has_changes=true" >> $GITHUB_OUTPUT
            fi
            echo "matrix=$CHANGED_DBS" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
            if [ "$DATABASE" = "all" ]; then
              echo "matrix=$ALL_DBS" >> $GITHUB_OUTPUT
            else
              MATRIX=$(echo "$ALL_DBS" | jq -c "[.[] | select(.name == \"$DATABASE\")]")
              echo "matrix=$MATRIX" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Set build matrix
        id: set-matrix
        run: |
          MATRIX='${{ steps.detect.outputs.matrix }}'
          echo "matrix={\"include\":$MATRIX}" >> $GITHUB_OUTPUT

  # ===========================================================================
  # Build Migration Docker Images
  # ===========================================================================
  build:
    name: Build ${{ matrix.name }}
    needs: prepare
    if: needs.prepare.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare.outputs.matrix) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.image }}
          tags: |
            type=raw,value=${{ needs.prepare.outputs.image_tag }}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v5
        with:
          context: database/${{ matrix.repo }}
          file: database/${{ matrix.repo }}/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.image }}:${{ needs.prepare.outputs.image_tag }}
          format: 'table'
          exit-code: '0'
          severity: 'CRITICAL,HIGH'

      - name: Build summary
        run: |
          echo "### ${{ matrix.name }} migration image" >> $GITHUB_STEP_SUMMARY
          echo "- **Image:** \`${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.image }}:${{ needs.prepare.outputs.image_tag }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Digest:** \`${{ steps.build.outputs.digest }}\`" >> $GITHUB_STEP_SUMMARY

  # ===========================================================================
  # Run Migrations as K8s Jobs
  # ===========================================================================
  run-migrations:
    name: Migrate ${{ matrix.name }} (${{ inputs.environment || 'dev' }})
    needs: [prepare, build]
    if: inputs.dry_run != true && inputs.environment != ''
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    outputs:
      status: ${{ steps.result.outputs.status }}

    strategy:
      fail-fast: false
      max-parallel: 3
      matrix: ${{ fromJson(needs.prepare.outputs.matrix) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: |
          CLUSTER_MAP='{"dev":"quckapp-dev","qa":"quckapp-qa","staging":"quckapp-staging","production":"quckapp-prod"}'
          CLUSTER=$(echo "$CLUSTER_MAP" | jq -r '."${{ inputs.environment }}"')
          aws eks update-kubeconfig --name "$CLUSTER" --region ${{ env.AWS_REGION }}

      - name: Apply migration Job
        id: migrate
        run: |
          export IMAGE_TAG="${{ needs.prepare.outputs.image_tag }}"
          export TARGET_SERVICE="${{ inputs.service || 'all' }}"
          export MIGRATION_TIMESTAMP="$(date -u +%Y-%m-%dT%H:%M:%SZ)"

          # DynamoDB-specific env
          if [ "${{ matrix.name }}" = "dynamodb" ]; then
            export TF_ENVIRONMENT="${{ inputs.environment }}"
            export TF_AUTO_APPROVE="true"
          fi

          # Apply the Job manifest with variable substitution
          JOB_FILE="database/${{ matrix.repo }}/k8s/migration-job.yaml"
          envsubst < "$JOB_FILE" | kubectl apply -f -

          # Extract job name
          JOB_NAME=$(envsubst < "$JOB_FILE" | grep "name:" | head -1 | awk '{print $2}')

          # Wait for Job completion (10 min timeout)
          echo "Waiting for Job $JOB_NAME to complete..."
          if kubectl wait --for=condition=complete job/"$JOB_NAME" \
            -n quckapp --timeout=600s 2>/dev/null; then
            echo "Migration completed successfully"
            echo "status=success" >> $GITHUB_OUTPUT
          else
            # Check if it failed
            FAILED=$(kubectl get job "$JOB_NAME" -n quckapp \
              -o jsonpath='{.status.failed}' 2>/dev/null)
            if [ "$FAILED" -gt 0 ] 2>/dev/null; then
              echo "Migration failed"
              echo "status=failed" >> $GITHUB_OUTPUT
              # Dump logs for debugging
              POD=$(kubectl get pods -n quckapp -l job-name="$JOB_NAME" \
                -o jsonpath='{.items[0].metadata.name}' 2>/dev/null)
              if [ -n "$POD" ]; then
                echo "### Migration Logs" >> $GITHUB_STEP_SUMMARY
                echo '```' >> $GITHUB_STEP_SUMMARY
                kubectl logs "$POD" -n quckapp --tail=100 >> $GITHUB_STEP_SUMMARY 2>&1
                echo '```' >> $GITHUB_STEP_SUMMARY
              fi
              exit 1
            fi
          fi

      - name: Migration summary
        if: always()
        run: |
          echo "### ${{ matrix.name }} migration" >> $GITHUB_STEP_SUMMARY
          echo "- **Environment:** ${{ inputs.environment }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Service:** ${{ inputs.service || 'all' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Status:** ${{ steps.migrate.outputs.status || 'unknown' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Image:** \`${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.image }}:${{ needs.prepare.outputs.image_tag }}\`" >> $GITHUB_STEP_SUMMARY

      - name: Set result
        id: result
        if: always()
        run: echo "status=${{ steps.migrate.outputs.status || 'failed' }}" >> $GITHUB_OUTPUT

  # ===========================================================================
  # Summary
  # ===========================================================================
  summary:
    name: Migration Summary
    needs: [prepare, build, run-migrations]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Summary
        run: |
          echo "## Database Migration Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Database | Build | Migration |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|-----------|" >> $GITHUB_STEP_SUMMARY
          echo "| All | ${{ needs.build.result }} | ${{ needs.run-migrations.result }} |" >> $GITHUB_STEP_SUMMARY
