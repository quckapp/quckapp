# .github/workflows/terraform-aks.yml
name: Terraform AKS Clusters

on:
  workflow_dispatch:
    inputs:
      cluster:
        description: 'AKS cluster to manage'
        required: true
        type: choice
        options:
          - aks-nonprod
          - aks-staging
          - aks-prod
      action:
        description: 'Terraform action'
        required: true
        type: choice
        options:
          - plan
          - apply

permissions:
  id-token: write
  contents: read

jobs:
  terraform:
    name: Terraform ${{ inputs.action }} (${{ inputs.cluster }})
    runs-on: ubuntu-latest
    environment: ${{ inputs.cluster }}
    defaults:
      run:
        working-directory: infrastructure/terraform
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '1.6'

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Terraform Init
        env:
          CLUSTER: ${{ inputs.cluster }}
        run: |
          terraform init \
            -backend-config="key=${CLUSTER}.tfstate"

      - name: Terraform Plan
        env:
          CLUSTER: ${{ inputs.cluster }}
        run: |
          terraform plan \
            -var-file="environments/${CLUSTER}.tfvars" \
            -out=tfplan

      - name: Terraform Apply
        if: inputs.action == 'apply'
        run: terraform apply tfplan
