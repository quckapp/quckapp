name: "CI/CD — search-service"

on:
  push:
    branches: [main]
    paths: ['services/search-service/**']
  pull_request:
    paths: ['services/search-service/**']
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'
      - name: Run tests
        working-directory: services/search-service
        run: go test -v ./...

  deploy:
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    uses: ./.github/workflows/reusable-service-deploy.yml
    with:
      service_name: search-service
      service_path: services/search-service
      language: go
      port: '5006'
    secrets: inherit
