name: "CI/CD — notification-service"

on:
  push:
    branches: [main]
    paths: ['services/notification-service/**']
  pull_request:
    paths: ['services/notification-service/**']
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install deps and test
        working-directory: services/notification-service
        run: |
          npm ci
          npm test

  deploy:
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    uses: ./.github/workflows/reusable-service-deploy.yml
    with:
      service_name: notification-service
      service_path: services/notification-service
      language: nestjs
      port: '3001'
    secrets: inherit
