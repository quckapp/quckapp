name: "CI/CD — admin-service"

on:
  push:
    branches: [main]
    paths: ['services/admin-service/**']
  pull_request:
    paths: ['services/admin-service/**']
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - name: Run tests
        working-directory: services/admin-service
        run: mvn test -B

  deploy:
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    uses: ./.github/workflows/reusable-service-deploy.yml
    with:
      service_name: admin-service
      service_path: services/admin-service
      language: spring
      port: '8085'
    secrets: inherit
