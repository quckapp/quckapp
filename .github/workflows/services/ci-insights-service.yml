name: "CI/CD — insights-service"

on:
  push:
    branches: [main]
    paths: ['services/insights-service/**']
  pull_request:
    paths: ['services/insights-service/**']
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install deps and test
        working-directory: services/insights-service
        run: |
          pip install -r requirements.txt
          pytest -v

  deploy:
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    uses: ./.github/workflows/reusable-service-deploy.yml
    with:
      service_name: insights-service
      service_path: services/insights-service
      language: python
      port: '5018'
    secrets: inherit
