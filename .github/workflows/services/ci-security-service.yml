name: "CI/CD — security-service"

on:
  push:
    branches: [main]
    paths: ['services/security-service/**']
  pull_request:
    paths: ['services/security-service/**']
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - name: Run tests
        working-directory: services/security-service
        run: mvn test -B

  deploy:
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    uses: ./.github/workflows/reusable-service-deploy.yml
    with:
      service_name: security-service
      service_path: services/security-service
      language: spring
      port: '8086'
    secrets: inherit
