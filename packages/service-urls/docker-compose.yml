# =============================================================================
# QUCKAPP SERVICE-URLS — Self-Contained Stack
# =============================================================================
# Runs the full service-urls management system: UI + API + MySQL
#
# Usage:
#   docker compose -f service-urls/docker-compose.yml up -d --build
#
# Ports:
#   - 3003  → Frontend UI (nginx)
#   - 18087 → API (direct access, optional)
#
# Build context is repo root (.) for all services.
# =============================================================================

services:
  # ─── React Frontend (nginx) ──────────────────────────────────────────────
  service-urls-ui:
    build:
      context: ../..
      dockerfile: packages/service-urls/ui/Dockerfile
    container_name: quckapp-service-urls-ui
    restart: unless-stopped
    ports:
      - "3003:80"
    depends_on:
      service-urls-api:
        condition: service_healthy
    networks:
      - service-urls-network

  # ─── Go API Backend ──────────────────────────────────────────────────────
  service-urls-api:
    build:
      context: ../..
      dockerfile: packages/service-urls/api/v1/Dockerfile
    container_name: quckapp-service-urls-api
    restart: unless-stopped
    ports:
      - "18087:8085"
    environment:
      PORT: "8085"
      MYSQL_HOST: service-urls-db
      MYSQL_PORT: "3306"
      MYSQL_DATABASE: quckapp_admin
      MYSQL_USERNAME: root
      MYSQL_PASSWORD: root_secret
      JWT_SECRET: ${JWT_SECRET:-local-dev-jwt-secret-change-in-production-min-32-chars}
      GIN_MODE: release
    depends_on:
      service-urls-db:
        condition: service_healthy
    networks:
      - service-urls-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8085/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ─── MySQL Database ──────────────────────────────────────────────────────
  service-urls-db:
    image: mysql:8.0
    container_name: quckapp-service-urls-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root_secret
      MYSQL_DATABASE: quckapp_admin
      MYSQL_USER: quckapp
      MYSQL_PASSWORD: quckapp_secret
    volumes:
      - service_urls_data:/var/lib/mysql
      - ./docker/init:/docker-entrypoint-initdb.d
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --default-authentication-plugin=mysql_native_password
      --innodb-use-native-aio=0
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot_secret"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s
    networks:
      - service-urls-network

volumes:
  service_urls_data:
    driver: local

networks:
  service-urls-network:
    driver: bridge
