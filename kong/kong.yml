_format_version: "3.0"
_transform: true

# =============================================================================
# SERVICES — upstream microservices Kong routes traffic to
# =============================================================================
#
# VERSIONING STRATEGY (Semantic Versioning)
# ─────────────────────────────────────────
# All client-facing paths follow: /api/{version}/{resource}
# Supported version formats: v1, v1.1, v2, v2.0.1
#
# Routes use regex to accept ANY version:  ~/api/v\d+(?:\.\d+)*/resource
# Kong injects X-Api-Version header so backends know which version was requested.
#
# Clients call the version configured in @quckapp/service-urls.
# To upgrade an API: bump the version in service-urls per environment,
# then deploy the new version handler in the backend service.
#
# Category A (Spring Boot): strip_path: true — rewrites /api/vX/<svc> → backend /api/<svc>/vX
# Category B (Go/Elixir):   strip_path: false — path passes through unchanged
# Category C (NestJS):       strip_path: true — rewrites /api/vX/<resource> → backend /api/<resource>
#
# The X-Api-Version header is injected by the global request-transformer plugin.
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # Group 1: Auth & Security (Spring Boot — backend expects /api/v1/<svc>/v1/*)
  # strip_path: true rewrites /api/vX/auth/* → /api/v1/auth/*
  # When a v2 backend is deployed, add a separate auth-service-v2 entry.
  # ---------------------------------------------------------------------------

  - name: auth-service
    url: http://auth-service:8081/api/v1/auth
    connect_timeout: 10000
    write_timeout: 10000
    read_timeout: 10000
    retries: 3
    routes:
      - name: auth-routes
        paths:
          - "~/api/v\\d+(?:\\.\\d+)*/auth"
        strip_path: true
        preserve_host: true
    plugins:
      - name: rate-limiting
        config:
          minute: 100
          policy: local
          fault_tolerant: true
          hide_client_headers: false
      - name: cors
        config:
          origins: ["*"]
          methods: [GET, POST, PUT, PATCH, DELETE, OPTIONS]
          headers: [Authorization, Content-Type, X-Request-ID, X-Correlation-ID, X-Api-Version]
          credentials: true
          max_age: 3600
      - name: request-size-limiting
        config:
          allowed_payload_size: 1
          size_unit: megabytes

  - name: permission-service
