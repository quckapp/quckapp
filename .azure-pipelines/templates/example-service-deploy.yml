# =============================================================================
# Example: Service deployment pipeline with version promotion gates
# =============================================================================
# Copy and adapt this for each service.
# =============================================================================

trigger:
  branches:
    include:
      - main
  paths:
    include:
      - 'services/user-service/**'

variables:
  serviceKey: 'user-service'
  apiVersion: 'v1'
  serviceUrlsApiUrl: '$(SERVICE_URLS_API_URL)'

stages:
  - stage: Build
    jobs:
      - job: BuildPush
        pool:
          vmImage: 'ubuntu-latest'
        steps:
          - task: Docker@2
            inputs:
              command: buildAndPush
              repository: '$(serviceKey)'
              dockerfile: 'services/$(serviceKey)/Dockerfile'

  - stage: DeployDev
    dependsOn: Build
    jobs:
      - deployment: DeployDev
        environment: 'development'
        strategy:
          runOnce:
            deploy:
              steps:
                - template: templates/version-promotion-gate.yml
                  parameters:
                    serviceKey: '$(serviceKey)'
                    apiVersion: '$(apiVersion)'
                    targetEnvironment: 'dev'
                    serviceUrlsApiUrl: '$(serviceUrlsApiUrl)'
                - script: echo "Deploy to dev AKS..."
                  displayName: 'Deploy to dev'
                - template: templates/version-promotion-record.yml
                  parameters:
                    serviceKey: '$(serviceKey)'
                    apiVersion: '$(apiVersion)'
                    targetEnvironment: 'dev'
                    serviceUrlsApiUrl: '$(serviceUrlsApiUrl)'

  - stage: DeployQA
    dependsOn: DeployDev
    jobs:
      - deployment: DeployQA
        environment: 'qa'
        strategy:
          runOnce:
            deploy:
              steps:
                - template: templates/version-promotion-gate.yml
                  parameters:
                    serviceKey: '$(serviceKey)'
                    apiVersion: '$(apiVersion)'
                    targetEnvironment: 'qa'
                    serviceUrlsApiUrl: '$(serviceUrlsApiUrl)'
                - script: echo "Deploy to qa AKS..."
                  displayName: 'Deploy to QA'
                - template: templates/version-promotion-record.yml
                  parameters:
                    serviceKey: '$(serviceKey)'
                    apiVersion: '$(apiVersion)'
                    targetEnvironment: 'qa'
                    serviceUrlsApiUrl: '$(serviceUrlsApiUrl)'

  - stage: DeployProduction
    dependsOn: DeployQA
    jobs:
      - deployment: DeployProd
        environment: 'production'
        strategy:
          runOnce:
            deploy:
              steps:
                - template: templates/version-promotion-gate.yml
                  parameters:
                    serviceKey: '$(serviceKey)'
                    apiVersion: '$(apiVersion)'
                    targetEnvironment: 'production'
                    serviceUrlsApiUrl: '$(serviceUrlsApiUrl)'
                - script: echo "Deploy to production AKS..."
                  displayName: 'Deploy to Production'
                - template: templates/version-promotion-record.yml
                  parameters:
                    serviceKey: '$(serviceKey)'
                    apiVersion: '$(apiVersion)'
                    targetEnvironment: 'production'
                    serviceUrlsApiUrl: '$(serviceUrlsApiUrl)'
